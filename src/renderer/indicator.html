<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recording Indicator</title>
    <style>
      :root {
        /* Aligned with globals.css warm palette — Light */
        --bg: rgba(255, 255, 255, 0.94);
        --border: rgba(229, 224, 216, 0.6);
        --text: #2D2A26;
        --text-muted: #8A857C;
        --recording: #C53030;
        --recording-bg: rgba(197, 48, 48, 0.08);
        --processing: #3B6B96;
        --processing-bg: rgba(59, 107, 150, 0.08);
        --success: #5D7A4F;
        --success-bg: rgba(93, 122, 79, 0.08);
        --kbd-bg: #F0EDE6;
        --kbd-border: #E5E0D8;
        --shadow: 0 4px 16px -2px rgba(45, 42, 38, 0.10), 0 1px 4px rgba(45, 42, 38, 0.06);
      }

      /* Dark — activated by .dark class on <html>, matching main app behavior */
      html.dark {
        --bg: rgba(36, 34, 32, 0.92);
        --border: rgba(58, 55, 52, 0.7);
        --text: #E8E4DD;
        --text-muted: #9A958D;
        --recording: #E53E3E;
        --recording-bg: rgba(229, 62, 62, 0.10);
        --processing: #6A9FC5;
        --processing-bg: rgba(106, 159, 197, 0.10);
        --success: #7A9C6A;
        --success-bg: rgba(122, 156, 106, 0.10);
        --kbd-bg: #2A2826;
        --kbd-border: #3A3734;
        --shadow: 0 4px 16px -2px rgba(0, 0, 0, 0.28), 0 1px 4px rgba(0, 0, 0, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        user-select: none;
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Ensure pill never touches window edges — protects border-radius */
        padding: 4px 8px;
      }

      .indicator {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
        transition: opacity 150ms ease, transform 150ms ease;
        white-space: nowrap;
      }

      .indicator.visible {
        display: inline-flex;
      }

      /* ── Recording dot ── */
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--recording);
        flex-shrink: 0;
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.15); }
      }

      /* ── Icons ── */
      .icon {
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .icon svg {
        width: 16px;
        height: 16px;
      }

      /* ── Text ── */
      .text {
        font-size: 13px;
        font-weight: 500;
        line-height: 1;
        color: var(--text);
        white-space: nowrap;
      }

      .meta {
        font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
        font-variant-numeric: tabular-nums;
        font-size: 12px;
        line-height: 1;
        color: var(--text-muted);
        white-space: nowrap;
      }

      .hotkey {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--kbd-border);
        background: var(--kbd-bg);
        border-radius: 4px;
        padding: 2px 6px;
        font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
        font-size: 10px;
        font-weight: 500;
        line-height: 1;
        color: var(--text-muted);
        white-space: nowrap;
      }

      /* ── Processing dots ── */
      .proc-dots {
        display: none;
        align-items: center;
        gap: 3px;
      }

      .proc-dots span {
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: var(--processing);
        animation: proc-bounce 1s ease-in-out infinite;
      }

      .proc-dots span:nth-child(2) { animation-delay: 0.15s; }
      .proc-dots span:nth-child(3) { animation-delay: 0.3s; }

      @keyframes proc-bounce {
        0%, 100% { opacity: 0.3; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1); }
      }

      /* ── State: Recording ── */
      .state-recording .icon-mic { display: inline-flex; color: var(--recording); }
      .state-recording .icon-loader,
      .state-recording .icon-check { display: none; }
      .state-recording .meta,
      .state-recording .hotkey,
      .state-recording .dot { display: inline-flex; }
      .state-recording .proc-dots { display: none; }
      .state-recording .text { color: var(--recording); }

      /* ── State: Processing ── */
      .state-processing .icon-loader {
        display: inline-flex;
        color: var(--processing);
        animation: spin 0.8s linear infinite;
      }
      .state-processing .icon-mic,
      .state-processing .icon-check,
      .state-processing .dot,
      .state-processing .meta,
      .state-processing .hotkey { display: none; }
      .state-processing .proc-dots { display: inline-flex; }
      .state-processing .text { color: var(--processing); }

      /* ── State: Complete ── */
      .state-complete .icon-check { display: inline-flex; color: var(--success); }
      .state-complete .icon-mic,
      .state-complete .icon-loader,
      .state-complete .dot,
      .state-complete .hotkey,
      .state-complete .proc-dots { display: none; }
      .state-complete .meta { display: inline-flex; }
      .state-complete .text { color: var(--success); }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="indicator" class="indicator">
      <span class="dot"></span>

      <span class="icon icon-mic" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <path d="M12 19v3" />
        </svg>
      </span>

      <span class="icon icon-loader" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.2-8.56" />
        </svg>
      </span>

      <span class="icon icon-check" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9" />
          <path d="m8.5 12 2.2 2.2L15.8 9" />
        </svg>
      </span>

      <span id="statusText" class="text">Recording...</span>
      <span id="metaText" class="meta">0:00</span>
      <span id="hotkeyText" class="hotkey">R Ctrl</span>

      <span class="proc-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </div>

    <script>
      const indicator = document.getElementById('indicator')
      const statusText = document.getElementById('statusText')
      const metaText = document.getElementById('metaText')
      const hotkeyText = document.getElementById('hotkeyText')

      let timer = null
      let seconds = 0
      let lastCharCount = 0
      let lastState = 'idle'
      let completeTimer = null
      let feedbackTimer = null

      function formatSeconds(total) {
        const minutes = Math.floor(total / 60)
        const secs = total % 60
        return `${minutes}:${String(secs).padStart(2, '0')}`
      }

      function setIndicatorState(state) {
        indicator.className = 'indicator visible'
        indicator.classList.add(`state-${state}`)
      }

      function hideIndicator() {
        indicator.className = 'indicator'
      }

      function clearTimers() {
        if (timer) {
          clearInterval(timer)
          timer = null
        }
        if (completeTimer) {
          clearTimeout(completeTimer)
          completeTimer = null
        }
        if (feedbackTimer) {
          clearTimeout(feedbackTimer)
          feedbackTimer = null
        }
      }

      function toHotkeyLabel(triggerKey) {
        if (!triggerKey) return 'R Ctrl'
        if (triggerKey === 'RCtrl') return 'R Ctrl'
        if (triggerKey === 'RAlt') return 'R Alt'
        return triggerKey
      }

      async function loadHotkey() {
        try {
          const config = await window.api.getConfig()
          const triggerKey = config?.hotkey?.triggerKey
          hotkeyText.textContent = toHotkeyLabel(triggerKey)
        } catch {
          hotkeyText.textContent = 'R Ctrl'
        }
      }

      function applyTheme(themeSetting) {
        let isDark = false
        if (themeSetting === 'dark') {
          isDark = true
        } else if (themeSetting === 'light') {
          isDark = false
        } else {
          // 'system' or undefined — follow OS
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        }
        document.documentElement.classList.toggle('dark', isDark)
      }

      async function loadTheme() {
        try {
          const config = await window.api.getConfig()
          applyTheme(config?.ui?.theme)
        } catch {
          applyTheme('system')
        }
      }

      // Follow OS changes when theme is 'system'
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        void loadTheme()
      })

      void loadHotkey()
      void loadTheme()

      window.api.onOutputText(({ text }) => {
        lastCharCount = String(text || '').length
      })

      window.api.onRecordingState((state) => {
        if (state.recording) {
          clearTimers()
          void loadTheme()
          lastState = 'recording'
          seconds = 0
          statusText.textContent = 'Recording...'
          metaText.textContent = '0:00'
          setIndicatorState('recording')
          timer = setInterval(() => {
            seconds += 1
            metaText.textContent = formatSeconds(seconds)
          }, 1000)
          return
        }

        if (state.processing) {
          clearTimers()
          lastState = 'processing'
          statusText.textContent = 'Transcribing...'
          setIndicatorState('processing')
          return
        }

        clearTimers()
        if (lastState === 'recording' || lastState === 'processing') {
          lastState = 'complete'
          statusText.textContent = 'Text inserted'
          metaText.textContent = lastCharCount > 0 ? `${lastCharCount} chars` : 'done'
          setIndicatorState('complete')
          completeTimer = setTimeout(() => {
            lastState = 'idle'
            hideIndicator()
          }, 900)
        } else {
          lastState = 'idle'
          hideIndicator()
        }
      })

      window.api.onIndicatorFeedback(({ message }) => {
        clearTimers()
        lastState = 'feedback'
        statusText.textContent = message || 'Action blocked'
        metaText.textContent = 'Please stop the current session first.'
        setIndicatorState('processing')
        feedbackTimer = setTimeout(() => {
          lastState = 'idle'
          hideIndicator()
          feedbackTimer = null
        }, 1800)
      })
    </script>
  </body>
</html>
