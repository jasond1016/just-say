<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Warm charcoal rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="#2D2A26" />

  <!-- Microphone body -->
  <rect x="432" y="240" width="160" height="280" rx="80" fill="#B8632F" />

  <!-- Microphone arc (using a path for the U-shape) -->
  <path
    d="M 352 480 L 352 540 C 352 628 424 700 512 700 C 600 700 672 628 672 540 L 672 480"
    fill="none"
    stroke="#B8632F"
    stroke-width="56"
    stroke-linecap="round"
  />

  <!-- Microphone stand (vertical line) -->
  <line x1="512" y1="700" x2="512" y2="800" stroke="#B8632F" stroke-width="56" stroke-linecap="round" />

  <!-- Microphone base (horizontal line) -->
  <line x1="412" y1="800" x2="612" y2="800" stroke="#B8632F" stroke-width="56" stroke-linecap="round" />
</svg>
